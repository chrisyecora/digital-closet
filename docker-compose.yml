version: '3.8'

services:
  postgres:
    image: ankane/pgvector
    container_name: digital_closet_postgres
    environment:
      POSTGRES_USER: digital_closet
      POSTGRES_PASSWORD: digital_closet
      POSTGRES_DB: digital_closet_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticmq:
    image: softwaremill/elasticmq-native
    container_name: digital_closet_sqs
    ports:
      - '9324:9324'
      - '9325:9325'
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: /bin/sh -c
      "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done; mc mb local/digital-closet-local --ignore-existing"
    restart: "no"

volumes:
  postgres_data:
  minio-data:
